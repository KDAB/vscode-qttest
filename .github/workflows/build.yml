# SPDX-License-Identifier: MIT

# CI that builds this vscode extension

name: build

on:
  pull_request:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
      - name: Install dependencies
        run: |
          npm install --loglevel verbose
          npm install @vscode/vsce typescript -g

      - name: compile
        run: npm run compile

      - name: test (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm test

      - name: test (non-Linux)
        if: runner.os != 'Linux'
        run: npm test

      - name: remove dev dependencies
        run: npm prune --production

      - name: vsce package
        run: vsce package
